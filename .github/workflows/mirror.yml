# .github/workflows/mirror.yml
name: Mirror to another repo

on:
  push:          # Trigger on every push
    branches: [ '**' ]   # All branches
  delete:        # Also mirror deletions of branches/tags
  workflow_dispatch:   # Allow manual trigger

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Important: get full history

      - uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: https://${{ secrets.MIRROR_PAT }}@github.com/SGCS-SE/2026-at3-software-project-will-da-pro.git
          # Or use SSH (recommended for some cases):
          # target_repo_url: git@github.com:OWNER/MIRROR-REPO.git
          # ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
