name: Mirror to Target Repo

on:
  push:
    branches: [ "**" ]
  delete:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: https://github.com/SGCS-SE/2026-at3-software-project-will-da-pro.git
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
