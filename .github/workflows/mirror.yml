name: Mirror to Target Repo

on:
  push:
    branches: [ "**" ]
  delete:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Test SSH Connection
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t rsa github.com >> ~/.ssh/known_hosts
          ssh -T -i ~/.ssh/id_rsa git@github.com || true

      - name: Push to Mirror Repo
        run: |
          # Replace with your actual target SSH URL
          git remote add mirror git@github.com:SGCS-SE/2026-at3-software-project-will-da-pro.git
          
          # Force Git to use the specific SSH key we just set up
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/id_rsa"
          
          # Push everything
          git push --mirror mirror
